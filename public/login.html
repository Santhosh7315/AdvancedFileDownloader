<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Motherson iDCAS File Portal</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            background: linear-gradient(135deg, #eaf4ff, #f7fbff);
        }

        .left-panel {
            flex: 1;
            background: linear-gradient(135deg, #0078D4, #2B88D8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 40px;
            text-align: center;
        }

        .logo img {
            width: 140px;
        }

        .brand-title {
            font-size: 34px;
            font-weight: 700;
            margin-top: 20px;
        }

        .brand-sub {
            max-width: 340px;
            line-height: 1.8;
            margin-top: 10px;
            color: #EAF4FF;
        }

        .right-panel {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            width: 400px;
            background: #fff;
            padding: 40px;
            border-radius: 18px;
            box-shadow: 0 15px 35px rgba(0, 120, 212, .18);
        }

        .login-box h2 {
            margin-bottom: 24px;
            font-weight: 600;
        }

        .input-group {
            position: relative;
            margin-bottom: 18px;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            padding-right: 40px; /* Leave breathing space for the eye icon */
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-group input:focus {
            border-color: #0078D4;
            box-shadow: 0 0 0 3px rgba(0, 120, 212, 0.15);
        }

        .show-pass {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            user-select: none;
            color: #64748b;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #64748b;
            font-size: 14px;
            margin-bottom: 24px;
            cursor: pointer;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #0078D4;
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .login-btn:hover {
            background: #005FA3;
        }

        .footer {
            margin-top: 24px;
            color: #64748b;
            font-size: 13px;
        }
    </style>
</head>

<body>
    <div class="left-panel">
        <div class="logo"><img src="logo.png" alt="Motherson Logo"></div>
        <div class="brand-title">iDCAS File Portal</div>
        <div class="brand-sub">Enterprise File Distribution System<br>Securely upload, manage and download applications.</div>
    </div>
    <div class="right-panel">
        <div class="login-box">
            <h2 style="color:#0078D4">Admin Login</h2>
            
            <div class="input-group">
                <input id="username" type="text" placeholder="Username" autocomplete="username">
            </div>
            
            <div class="input-group">
                <input id="password" type="password" placeholder="Password" autocomplete="current-password">
                <span class="show-pass" onclick="togglePassword()">👁</span>
            </div>
            
            <label class="remember-me">
                <input type="checkbox"> Remember me
            </label>
            
            <button class="login-btn" onclick="login()">Sign In</button>
            
            <div class="footer">Microsoft Azure Inspired UI</div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function togglePassword() {
            const p = document.getElementById("password");
            if (p) {
                p.type = p.type === "password" ? "text" : "password";
            }
        }
    </script>
</body>
</html>
