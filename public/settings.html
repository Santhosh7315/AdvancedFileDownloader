<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Settings</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        body {
            display: flex;
            height: 100vh;
            background: #F4F8FC;
            color: #1f2937;
        }
        .sidebar {
            width: 240px;
            background: #0078D4;
            color: #fff;
            padding: 24px;
            display: flex;
            flex-direction: column;
        }
        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
        }
        .sidebar a {
            color: #EAF4FF;
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .sidebar a:hover, .sidebar a.active {
            background: #fff;
            color: #0078D4;
        }
        .logout-btn {
            margin-top: auto;
            background: #fff;
            color: #0078D4;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
        }
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .header {
            height: 70px;
            background: #fff;
            border-bottom: 1px solid #dbe7f3;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
        }
        .profile-box {
            background: #EAF4FF;
            color: #0078D4;
            padding: 8px 14px;
            border-radius: 20px;
            font-weight: 600;
        }
        .top-logout {
            margin-left: 10px;
            background: #0078D4;
            color: #fff;
            border: none;
            padding: 9px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .top-logout:hover {
            background: #005FA3;
        }
        .content {
            padding: 40px;
        }
        .settings-card {
            width: 500px;
            background: #fff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,120,212,.12);
        }
        .settings-card h3 {
            margin-bottom: 10px;
            color: #0078D4;
        }
        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #CBD5E1;
            border-radius: 10px;
            margin: 18px 0;
            outline: none;
        }
        input:focus {
            border-color: #0078D4;
            box-shadow: 0 0 0 3px rgba(0,120,212,.15);
        }
        .save-btn {
            background: #0078D4;
            color: #fff;
            border: none;
            padding: 12px 22px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s;
        }
        .save-btn:hover {
            background: #005FA3;
        }
        #message {
            margin-top: 15px;
            color: #16a34a;
            font-size: 14px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>☁ iDCAS</h2>
        <a href="dashboard.html">Dashboard</a>
        <a href="settings.html" class="active">Settings</a>
        <div class="logout-btn" onclick="logout()">Logout</div>
    </div>
    
    <div class="main">
        <div class="header">
            <h2>Settings</h2>
            <div>
                <span class="profile-box">👤 Admin</span>
                <button class="top-logout" onclick="logout()">Logout</button>
            </div>
        </div>
        
        <div class="content">
            <div class="settings-card">
                <h3>Server File Path Configuration</h3>
                <input id="serverPath" placeholder="Enter server folder path">
                <button class="save-btn" onclick="savePath()">Save Path</button>
                <div id="message"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Set the input field context value safely upon layout rendering 
        document.addEventListener("DOMContentLoaded", () => {
            const serverPathInput = document.getElementById('serverPath');
            if (serverPathInput) {
                serverPathInput.value = localStorage.getItem('serverPath') || '/tmp/uploads';
            }
        });

        function savePath() {
            const pathInput = document.getElementById('serverPath');
            if (!pathInput) return;
            
            const targetPath = pathInput.value.trim();
            if (!targetPath) {
                alert('Enter a valid path');
                return;
            }
            
            localStorage.setItem('serverPath', targetPath);
            
            const msgEl = document.getElementById('message');
            if (msgEl) {
                msgEl.innerText = 'Server path saved successfully!';
                setTimeout(() => { msgEl.innerText = ''; }, 3000);
            }
        }
    </script>
</body>
</html>
